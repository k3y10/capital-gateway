services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mindlaunch
      POSTGRES_USER: mindlaunch
      POSTGRES_PASSWORD: mindlaunch
    ports:
      - "5432:5432"
    volumes:
      - mindlaunch-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mindlaunch -d mindlaunch"]
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "corepack enable && pnpm install --frozen-lockfile && pnpm run db:migrate && pnpm run db:seed && pnpm run api:start"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://mindlaunch:mindlaunch@postgres:5432/mindlaunch
      DATABASE_SSL: "false"
      CAPITAL_API_PORT: 8787
      CAPITAL_ADMIN_API_TOKEN: change-this-production-token-change-this-production-token
      CORS_ORIGIN: http://localhost:5173,http://127.0.0.1:5173
      PARTNER_TOKEN_REQUIRED: "false"
    ports:
      - "8787:8787"
    volumes:
      - .:/app

volumes:
  mindlaunch-postgres:
